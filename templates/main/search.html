{% extends 'base.html' %}
{% block content %}
    <h1>Поиск</h1>
    <form method="POST" action="{{ url_for('main.search') }}">
        <div class="form-group">
            <input type="text" class="form-control" name="search" placeholder="Введите запрос">
        </div>
        <button type="submit" class="btn btn-primary">Поиск</button>
    </form>
    <p><a href="{{ url_for('main.index') }}">Назад на главную</a></p>
{% endblock %}
